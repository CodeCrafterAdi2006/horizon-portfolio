name: Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check typescript
      run: npm run lint

    - name: Build production bundle
      run: npm run build

    - name: Scan build bundle for API key leaks
      run: |
        if grep -r "GEMINI_API_KEY" dist/; then
          echo "❌ CRITICAL ERROR: GEMINI_API_KEY environment variable name leaked in production build dist/"
          exit 1
        else
          echo "✅ Secure check: No API keys found in distribution files."
        fi
